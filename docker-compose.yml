# ============================================================
# GrelinMisay 健身目标管理助手 - Docker Compose 编排
# ============================================================
#
# 启动前准备：
#   1. cp .env.template .env 并编辑填入 LLM_API_KEY
#   2. cd grelinmisay-app && npm install && npm run build:h5 && cd ..
#   3. docker compose up -d --build
#
# 访问：
#   前端: http://localhost
#   API文档: http://localhost:8000/docs
#   健康检查: http://localhost:8000/api/health

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grelinmisay_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    # 环境变量（通过 .env 文件传入）
    env_file:
      - .env
    environment:
      # --- LLM 配置 ---
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-deepseek-chat}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.3}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-4096}
      - LLM_REQUEST_TIMEOUT=${LLM_REQUEST_TIMEOUT:-60}
      - LLM_MAX_RETRIES=${LLM_MAX_RETRIES:-3}
      - LLM_RETRY_DELAY=${LLM_RETRY_DELAY:-2}
      # --- ReAct 配置 ---
      - REACT_MAX_ITERATIONS=${REACT_MAX_ITERATIONS:-10}
      - REACT_OUTPUT_VALIDATION=${REACT_OUTPUT_VALIDATION:-true}
      - REACT_MAX_RETRIES=${REACT_MAX_RETRIES:-3}
      # --- 记忆管理 ---
      - MEMORY_WINDOW_SIZE=${MEMORY_WINDOW_SIZE:-12}
      - MEMORY_COMPRESSION_ENABLED=${MEMORY_COMPRESSION_ENABLED:-true}
      - MEMORY_MAX_TOKENS=${MEMORY_MAX_TOKENS:-8000}
      # --- 数据库 ---
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_PATH=${DB_PATH:-./data/agent.db}
      # --- 服务 ---
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - SERVER_DEBUG=${SERVER_DEBUG:-false}
      # --- 日志 ---
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=./logs
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
    # 持久化数据
    volumes:
      - backend_data:/app/data
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - grelinmisay_network

  nginx:
    image: nginx:alpine
    container_name: grelinmisay_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 前端构建产物（需先执行 npm run build:h5）
      - ./grelinmisay-app/dist:/usr/share/nginx/html:ro
      # Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - grelinmisay_network

# 命名卷
volumes:
  backend_data:
    driver: local
  backend_logs:
    driver: local

# 网络
networks:
  grelinmisay_network:
    driver: bridge
